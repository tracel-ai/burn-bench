name: Run Benchmarks

on:
  workflow_dispatch:
    inputs:
      backends:
        description: "Coma separated list of burn backends"
        required: false
        default: "wgpu-fusion"
      benches:
        description: "Coma separated list of benchmarks to run"
        required: false
        default: "matmul"
      dtypes:
        description: "Coma separated list of data types"
        required: false
        default: "f16"
      gcp-gpu-attached:
        description: "Must be true if the machine type has a GPU attached"
        type: boolean
        required: false
        default: true
      gcp-image-family:
        description: "GCP image family to use"
        required: false
        default: "tracel-ci-ubuntu-2404-amd64-nvidia"
      gcp-machine-type:
        description: "GCP machine type to use"
        required: false
        default: "g2-standard-4"
      gcp-zone:
        description: "GCP zone to use"
        required: false
        default: "us-east1-c"
      organization:
        description: "GitHub organization"
        required: false
        default: "tracel-ai"
      repository:
        description: "Target repository name"
        required: false
        default: "burn"
      rust-toolchain:
        description: "The Rust toolchain"
        required: false
        default: "stable"
      rust-version:
        description: "The Rust version"
        required: false
        default: "stable"
      versions:
        description: "Coma separated list of versions"
        required: false
        default: "main"

jobs:
  burn-bench:
    runs-on: [
      '@id:benchmarks-job-${{github.run_id}}-${{github.run_attempt}}',
      '@image-family:${{ inputs.gcp-image-family }}',
      '@machine-type:${{ inputs.gcp-machine-type }}',
      '@zone:${{ inputs.gcp-zone }}',
      '@gpu:${{ inputs.gcp-gpu-attached }}' ]
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v3
        with:
          rust-toolchain: ${{ inputs.rust-toolchain }}
          cache-key: ${{ inputs.rust-version }}-benchmarks
      - name: Print configuration
        run: |
          echo "Versions: ${{ inputs.versions }}"
          echo "Backends: ${{ inputs.backends }}"
          echo "DTypes: ${{ inputs.dtypes }}"
          echo "Benchmarks: ${{ inputs.benches }}"
          echo "Repository: ${{ inputs.organization }}/${{ inputs.repository }}"
          echo "GCP Image Family: ${{ inputs.gcp-image-family }}"
          echo "GCP Machine Type: ${{ inputs.gcp-machine-type }}"
          echo "GCP Zone: ${{ inputs.gcp-zone }}"
      - name: Run benchmarks
        run: |
          cargo bb run -b ${{ inputs.benches }} -B ${{ inputs.backends }} -V ${{ inputs.versions }} -v -d ${{ inputs.dtypes }}
